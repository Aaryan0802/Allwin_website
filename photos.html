    <style>
        .gallery-page-wrapper {
            padding: 130px 5% 80px; /* Clears the fixed header */
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }

        .gallery-page-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            background: var(--grad-brand, linear-gradient(135deg, #4580c2 0%, #fb4b52 100%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .gallery-page-subtitle {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            cursor: pointer;
            background: #fff;
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-card:hover img {
            transform: scale(1.08);
        }

        /* Smooth Dark Overlay on Hover */
        .gallery-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15,23,42,0.7), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-card:hover::after {
            opacity: 1;
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 50px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #4580c2, #fb4b52);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(251, 75, 82, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(251, 75, 82, 0.5);
        }

        @media(max-width: 768px) {
            .gallery-grid { gap: 15px; }
            .gallery-page-wrapper { padding: 100px 5% 50px; }
        }
    </style>
</head>

    <script>
        // Header scroll effect
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Mobile nav toggle
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');

        if (navToggle && navLinks) {
            navToggle.addEventListener('click', () => {
                navLinks.classList.toggle('open');
            });

            // Close menu when clicking a link
            navLinks.addEventListener('click', (e) => {
                if (e.target.tagName === 'A') {
                    navLinks.classList.remove('open');
                }
            });
        }
    </script>
